<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Digital - Seu acervo pessoal</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <meta name="theme-color" content="#2C5282">
    <style>
        /* CSS COMPLETO E BONITO - MODO DEUS ATIVADO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2C5282;
            --secondary: #4C51BF;
            --accent: #E2E8F0;
            --text: #1A202C;
            --text-light: #A0AEC0;
            --success: #48BB78;
            --warning: #ED8936;
            --danger: #F56565;
            --bg: #F7FAFC;
            --card-bg: #FFFFFF;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
            --shadow-hover: 0 20px 40px rgba(0,0,0,0.15);
            --border-radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --text: #E2E8F0;
            --text-light: #A0AEC0;
            --bg: #1A202C;
            --card-bg: #2D3748;
            --accent: #4A5568;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, var(--accent) 100%);
            color: var(--text);
            min-height: 100vh;
            transition: var(--transition);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        [data-theme="dark"] .header {
            background: rgba(45, 55, 72, 0.95);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .theme-toggle, .user-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }

        .theme-toggle:hover, .user-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
            margin-bottom: 50px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* Catalog */
        .catalog {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 30px;
            box-shadow: var(--shadow);
        }

        .catalog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-box {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid var(--accent);
            border-radius: 50px;
            font-size: 16px;
            transition: var(--transition);
            background: var(--bg);
            color: var(--text);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(44, 82, 130, 0.1);
        }

        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid var(--accent);
            background: transparent;
            border-radius: 25px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Book Cards */
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .book-card {
            background: var(--bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid var(--accent);
        }

        .book-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .book-cover {
            height: 200px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            position: relative;
        }

        .book-info {
            padding: 20px;
        }

        .book-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        .book-author {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 12px;
        }

        .book-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 12px;
        }

        .status-available {
            background: rgba(72, 187, 120, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status-borrowed {
            background: rgba(237, 137, 54, 0.1);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: var(--transition);
        }

        .btn-borrow {
            background: var(--success);
            color: white;
        }

        .btn-return {
            background: var(--warning);
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-1px);
        }

        /* Sidebar */
        .sidebar {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 30px;
            box-shadow: var(--shadow);
            height: fit-content;
        }

        .user-profile {
            text-align: center;
            margin-bottom: 30px;
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            text-align: center;
            padding: 20px;
            background: var(--bg);
            border-radius: var(--border-radius);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* Auth Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-hover);
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-light);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text);
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--accent);
            border-radius: 12px;
            font-size: 16px;
            transition: var(--transition);
            background: var(--bg);
            color: var(--text);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .auth-btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 20px 30px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            box-shadow: var(--shadow-hover);
            transform: translateX(400px);
            transition: var(--transition);
            z-index: 2000;
            min-width: 300px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.warning { background: var(--warning); }

        /* Admin Panel */
        .admin-panel {
            display: none;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 30px;
            box-shadow: var(--shadow);
            margin-top: 20px;
        }

        .admin-panel.active {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .add-book-form {
            display: grid;
            gap: 15px;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--accent);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .header { flex-direction: column; gap: 15px; }
            .books-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">📚 Biblioteca Digital</div>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle" title="Alternar tema">🌙</button>
                <button class="user-btn" id="userBtn">
                    <span id="userName">Entrar</span>
                </button>
            </div>
        </header>

        <div class="main-content">
            <!-- Catalog -->
            <section class="catalog">
                <div class="catalog-header">
                    <input type="text" class="search-box" id="searchInput" placeholder="🔍 Busque por título, autor ou gênero...">
                    <div class="filters">
                        <button class="filter-btn active" data-filter="all">Todos</button>
                        <button class="filter-btn" data-filter="available">Disponíveis</button>
                        <button class="filter-btn" data-filter="borrowed">Emprestados</button>
                    </div>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Carregando biblioteca...</p>
                </div>

                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-icon">📚</div>
                    <h3>Nenhum livro encontrado</h3>
                    <p>Tente ajustar sua busca ou filtros</p>
                </div>

                <div class="books-grid" id="booksGrid"></div>
            </section>

            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <h3 id="profileName">Bem-vindo!</h3>
                    <p id="profileRole">Visitante</p>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="totalBooks">0</div>
                        <div>Livros</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="borrowedBooks">0</div>
                        <div>Emprestados</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="availableBooks">0</div>
                        <div>Disponíveis</div>
                    </div>
                </div>

                <div class="admin-panel" id="adminPanel">
                    <h4>🔧 Painel Admin</h4>
                    <form class="add-book-form">
                        <input type="text" id="newTitle" placeholder="Título do livro" required>
                        <input type="text" id="newAuthor" placeholder="Autor" required>
                        <input type="text" id="newGenre" placeholder="Gênero" required>
                        <textarea id="newSynopsis" placeholder="Sinopse curta" rows="3"></textarea>
                        <button type="submit" class="auth-btn">➕ Adicionar Livro</button>
                    </form>
                </div>
            </aside>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <h2 id="modalTitle">Entrar na Biblioteca</h2>
            <form id="authForm">
                <div class="form-group">
                    <label for="username">Nome de usuário:</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Senha:</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group" style="text-align: center;">
                    <button type="submit" class="auth-btn">🚀 Acessar</button>
                </div>
                <div style="text-align: center; margin-top: 20px;">
                    <small><em>Dica Admin: admin / admin123</em></small>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script>
        // JAVASCRIPT COMPLETO - MODO DEUS ATIVADO! 🚀
        class BibliotecaApp {
            constructor() {
                this.currentUser = null;
                this.books = this.loadBooks();
                this.loans = JSON.parse(localStorage.getItem('biblioteca_loans')) || [];
                this.init();
            }

            init() {
                this.bindEvents();
                this.loadTheme();
                this.renderBooks();
                this.updateStats();
                this.registerSW();
            }

            // 📚 LIVROS FICTÍCIOS INCRÍVEIS (5+ livros)
            loadBooks() {
                return [
                    {
                        id: 1,
                        title: "O Pequeno Príncipe",
                        author: "Antoine de Saint-Exupéry",
                        genre: "Clássico Infantil",
                        synopsis: "Uma fábula filosófica sobre amizade, amor e a essência da vida.",
                        cover: "👦🌹",
                        status: "available"
                    },
                    {
                        id: 2,
                        title: "1984",
                        author: "George Orwell",
                        genre: "Distopia",
                        synopsis: "Vigilância totalitária em um futuro sombrio. 'Big Brother is watching you'.",
                        cover: "👁️📚",
                        status: "borrowed"
                    },
                    {
                        id: 3,
                        title: "Dom Casmurro",
                        author: "Machado de Assis",
                        genre: "Romance Brasileiro",
                        synopsis: "Bentinho suspeita da traição de Capitu. Clássico da literatura brasileira.",
                        cover: "❤️❓",
                        status: "available"
                    },
                    {
                        id: 4,
                        title: "Clean Code",
                        author: "Robert C. Martin",
                        genre: "Programação",
                        synopsis: "Guia definitivo para escrever código limpo e manutenível.",
                        cover: "💻✨",
                        status: "available"
                    },
                    {
                        id: 5,
                        title: "Sapiens",
                        author: "Yuval Noah Harari",
                        genre: "História",
                        synopsis: "Breve história da humanidade, das cavernas à inteligência artificial.",
                        cover: "🌍📖",
                        status: "borrowed"
                    },
                    {
                        id: 6,
                        title: "O Alquimista",
                        author: "Paulo Coelho",
                        genre: "Autoajuda",
                        synopsis: "Siga seus sonhos e ouça o coração. A jornada de Santiago pelo deserto.",
                        cover: "🏜️⭐",
                        status: "available"
                    }
                ];
            }

            bindEvents() {
                // Theme toggle
                document.getElementById('themeToggle').addEventListener('click', () => {
                    this.toggleTheme();
                });

                // User button
                document.getElementById('userBtn').addEventListener('click', () => {
                    if (this.currentUser) {
                        this.logout();
                    } else {
                        document.getElementById('authModal').classList.add('active');
                    }
                });

                // Auth form
                document.getElementById('authForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleLogin();
                });

                // Close modal
                document.getElementById('closeModal').addEventListener('click', () => {
                    document.getElementById('authModal').classList.remove('active');
                });

                // Search
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    this.searchBooks(e.target.value);
                });

                // Filters
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelector('.filter-btn.active').classList.remove('active');
                        e.target.classList.add('active');
                        this.filterBooks(e.target.dataset.filter);
                    });
                });

                // Admin form
                document.querySelector('.add-book-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.addBook();
                });

                // Close modal on outside click
                document.getElementById('authModal').addEventListener('click', (e) => {
                    if (e.target === e.currentTarget) {
                        e.currentTarget.classList.remove('active');
                    }
                });
            }

            // 🔐 AUTENTICAÇÃO
            handleLogin() {
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                if (username === 'admin' && password === 'admin123') {
                    this.currentUser = { name: 'Admin', role: 'admin', id: 'admin' };
                    this.showToast('Bem-vindo, Admin! Painel ativado.', 'success');
                    document.getElementById('adminPanel').classList.add('active');
                } else if (username && password) {
                    this.currentUser = { name: username, role: 'user', id: username };
                    this.showToast(`Olá, ${username}! Bem-vindo à biblioteca.`, 'success');
                } else {
                    this.showToast('Usuário ou senha inválidos!', 'error');
                    return;
                }

                this.updateUI();
                document.getElementById('authModal').classList.remove('active');
                document.getElementById('authForm').reset();
            }

            logout() {
                this.currentUser = null;
                this.updateUI();
                document.getElementById('adminPanel').classList.remove('active');
                this.showToast('Logout realizado com sucesso!', 'warning');
            }

            updateUI() {
                const userName = document.getElementById('userName');
                const userBtn = document.getElementById('userBtn');
                const profileName = document.getElementById('profileName');
                const profileRole = document.getElementById('profileRole');
                const userAvatar = document.getElementById('userAvatar');

                if (this.currentUser) {
                    userName.textContent = this.currentUser.name;
                    userBtn.textContent = 'Sair';
                    profileName.textContent = `Olá, ${this.currentUser.name}!`;
                    profileRole.textContent = this.currentUser.role.toUpperCase();
                    userAvatar.textContent = this.currentUser.role === 'admin' ? '👑' : '👤';
                } else {
                    userName.textContent = 'Entrar';
                    userBtn.textContent = 'Entrar';
                    profileName.textContent = 'Bem-vindo!';
                    profileRole.textContent = 'Visitante';
                    userAvatar.textContent = '👤';
                }
            }

            // 📚 CATÁLOGO
            renderBooks(books = this.books) {
                const grid = document.getElementById('booksGrid');
                const loading = document.getElementById('loading');
                const emptyState = document.getElementById('emptyState');

                loading.classList.add('active');

                setTimeout(() => {
                    loading.classList.remove('active');
                    
                    if (books.length === 0) {
                        grid.style.display = 'none';
                        emptyState.style.display = 'block';
                        return;
                    }

                    grid.style.display = 'grid';
                    emptyState.style.display = 'none';

                    grid.innerHTML = books.map(book => `
                        <div class="book-card" data-id="${book.id}">
                            <div class="book-cover">${book.cover}</div>
                            <div class="book-info">
                                <div class="book-title">${book.title}</div>
                                <div class="book-author">por ${book.author}</div>
                                <div class="book-status ${book.status}">
                                    <span>${book.status === 'available' ? '✅ Disponível' : '🔒 Emprestado'}</span>
                                    ${book.status === 'borrowed' ? `<small>até ${this.formatDate(book.dueDate)}</small>` : ''}
                                </div>
                                ${this.canInteract(book) ? `
                                    <button class="action-btn btn-${book.status}" 
                                            onclick="app.handleBookAction(${book.id})">
                                        ${book.status === 'available' ? '📖 Emprestar' : '↩️ Devolver'}
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    `).join('');
                }, 800);
            }

            searchBooks(query) {
                const filtered = this.books.filter(book => 
                    book.title.toLowerCase().includes(query.toLowerCase()) ||
                    book.author.toLowerCase().includes(query.toLowerCase()) ||
                    book.genre.toLowerCase().includes(query.toLowerCase())
                );
                this.renderBooks(filtered);
            }

            filterBooks(filter) {
                let filtered = [...this.books];
                
                if (filter === 'available') {
                    filtered = filtered.filter(book => book.status === 'available');
                } else if (filter === 'borrowed') {
                    filtered = filtered.filter(book => book.status === 'borrowed');
                }
                
                this.renderBooks(filtered);
            }

            // 💳 EMPRÉSTIMOS
            handleBookAction(bookId) {
                const book = this.books.find(b => b.id === bookId);
                
                if (!this.currentUser) {
                    this.showToast('Faça login para emprestar livros!', 'warning');
                    document.getElementById('authModal').classList.add('active');
                    return;
                }

                if (book.status === 'available') {
                    this.borrowBook(book);
                } else {
                    this.returnBook(book);
                }
            }

            borrowBook(book) {
                const dueDate = new Date();
                dueDate.setDate(dueDate.getDate() + 14); // 14 dias

                book.status = 'borrowed';
                book.dueDate = dueDate.toISOString().split('T')[0];
                book.borrowedBy = this.currentUser.id;
                book.borrowDate = new Date().toISOString().split('T')[0];

                this.loans.push({
                    bookId: book.id,
                    userId: this.currentUser.id,
                    borrowDate: book.borrowDate,
                    dueDate: book.dueDate
                });

                this.saveData();
                this.renderBooks();
                this.updateStats();
                this.showToast(`"${book.title}" emprestado com sucesso! Devolver em 14 dias.`, 'success');
            }

            returnBook(book) {
                book.status = 'available';
                delete book.dueDate;
                delete book.borrowedBy;
                delete book.borrowDate;

                this.loans = this.loans.filter(loan => 
                    !(loan.bookId === book.id && loan.userId === this.currentUser.id)
                );

                this.saveData();
                this.renderBooks();
                this.updateStats();
                this.showToast(`"${book.title}" devolvido com sucesso!`, 'success');
            }

            canInteract(book) {
                return this.currentUser || book.status === 'borrowed';
            }

            // 📊 ESTATÍSTICAS
            updateStats() {
                const total = this.books.length;
                const available = this.books.filter(b => b.status === 'available').length;
                const borrowed = total - available;

                document.getElementById('totalBooks').textContent = total;
                document.getElementById('availableBooks').textContent = available;
                document.getElementById('borrowedBooks').textContent = borrowed;
            }

            // ➕ ADMIN - ADICIONAR LIVRO
            addBook() {
                const title = document.getElementById('newTitle').value;
                const author = document.getElementById('newAuthor').value;
                const genre = document.getElementById('newGenre').value;
                const synopsis = document.getElementById('newSynopsis').value;

                if (!title || !author || !genre) {
                    this.showToast('Preencha todos os campos obrigatórios!', 'error');
                    return;
                }

                const newBook = {
                    id: Date.now(),
                    title,
                    author,
                    genre,
                    synopsis,
                    cover: this.getRandomCoverEmoji(),
                    status: 'available'
                };

                this.books.push(newBook);
                this.saveData();
                this.renderBooks();
                this.updateStats();

                document.querySelector('.add-book-form').reset();
                this.showToast(`"${title}" adicionado à biblioteca!`, 'success');
            }

            getRandomCoverEmoji() {
                const emojis = ['📖', '📚', '📘', '📗', '📙', '📕'];
                return emojis[Math.floor(Math.random() * emojis.length)];
            }

            // 💾 PERSISTÊNCIA
            saveData() {
                localStorage.setItem('biblioteca_books', JSON.stringify(this.books));
                localStorage.setItem('biblioteca_loans', JSON.stringify(this.loans));
            }

            loadTheme() {
                const theme = localStorage.getItem('biblioteca_theme') || 'light';
                document.documentElement.setAttribute('data-theme', theme);
                document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
            }

            toggleTheme() {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('biblioteca_theme', next);
                document.getElementById('themeToggle').textContent = next === 'dark' ? '☀️' : '🌙';
            }

            formatDate(dateStr) {
                return new Date(dateStr).toLocaleDateString('pt-BR');
            }

            // 🔔 NOTIFICAÇÕES
            showToast(message, type = 'success') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                
                container.appendChild(toast);
                setTimeout(() => toast.classList.add('show'), 100);
                
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 300);
                }, 4000);
            }

            // 📱 PWA SERVICE WORKER
            registerSW() {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('sw.js')
                        .then(reg => console.log('SW registrado!'))
                        .catch(err => console.log('SW falhou:', err));
                }
            }
        }

        // Inicializar app
        const app = new BibliotecaApp();

        // Exportar para botões dos cards
        window.app = app;
    </script>
</body>
</html>
